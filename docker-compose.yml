# One-command DocuMind stack: Ollama (LLM) + FastAPI (REST) + Streamlit (UI).
#
#   docker compose up --build
#
# The configured model is pulled automatically on first start. Then open:
#   • UI   → http://localhost:8501
#   • API  → http://localhost:8000/docs
services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
      - ./scripts/ollama-entrypoint.sh:/entrypoint.sh:ro
    environment:
      DOCUMIND_LLM_MODEL: ${DOCUMIND_LLM_MODEL:-llama3.2}
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DOCUMIND_OLLAMA_BASE_URL: http://ollama:11434
      DOCUMIND_LLM_MODEL: ${DOCUMIND_LLM_MODEL:-llama3.2}
    volumes:
      - ./data:/app/data
      - hf-cache:/root/.cache/huggingface
    depends_on:
      ollama:
        condition: service_healthy

  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "8501:8501"
    environment:
      DOCUMIND_OLLAMA_BASE_URL: http://ollama:11434
      DOCUMIND_LLM_MODEL: ${DOCUMIND_LLM_MODEL:-llama3.2}
    volumes:
      - ./data:/app/data
      - hf-cache:/root/.cache/huggingface
    depends_on:
      ollama:
        condition: service_healthy

volumes:
  ollama:
  hf-cache:
